<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#03261d,#0a4b38,#02140f);
overflow-x:hidden;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:2px solid rgba(255,215,0,.45);
border-radius:28px;
padding:35px 25px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.45);
color:#fff;
}

.logo{
font-size:70px;
filter:drop-shadow(0 0 18px gold);
animation:glow 2s infinite alternate;
}

@keyframes glow{
to{
filter:drop-shadow(0 0 30px gold);
}
}

h1{
margin-top:12px;
font-size:34px;
background:linear-gradient(90deg,#FFD700,#FFF4B0,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.city{
margin-top:8px;
color:#FFD76C;
letter-spacing:4px;
font-size:20px;
}
.msg{
margin-top:30px;
font-size:22px;
line-height:1.8;
color:#fff;
}

.msg span{
color:#FFD700;
font-weight:700;
}

.btn{
display:block;
width:100%;
margin-top:35px;
padding:18px;
border-radius:18px;
text-decoration:none;
font-size:22px;
font-weight:700;
color:#053322;
background:linear-gradient(135deg,#FFD700,#FFF2A0,#FFD700);
box-shadow:0 0 25px rgba(255,215,0,.45);
transition:.3s;
}

.btn:hover{
transform:scale(1.03);
}

.footer{
margin-top:30px;
font-size:15px;
line-height:1.8;
color:#ddd;
}

@media(max-width:480px){

h1{font-size:30px;}

.msg{font-size:19px;}

.btn{font-size:20px;}

}

</style>
</head>

<body>

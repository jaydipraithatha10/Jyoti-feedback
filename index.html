<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#03281d,#0b5b42,#02251a);
background-size:300% 300%;
animation:bgMove 8s ease infinite;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
margin:0;
overflow-x:hidden;
overflow-y:auto;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:2px solid rgba(255,215,0,.35);
border-radius:28px;
padding:35px 25px;
text-align:center;
color:#fff;
box-shadow:0 20px 45px rgba(0,0,0,.45);
position:relative;
overflow:hidden;
}
.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.08),
transparent
);
pointer-events:none;
animation:shine 6s linear infinite;
}


@keyframes shine{
0%{
left:-100%;
}
100%{
left:100%;
}
}
.logo{
font-size:70px;
margin-bottom:12px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 8px gold);
}
to{
filter:drop-shadow(0 0 22px gold);
}
}

h1{
font-size:32px;
margin-bottom:10px;
background:linear-gradient(90deg,#FFD700,#FFF3A0,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:22px;
line-height:1.6;
margin:22px 0;
font-weight:600;
}

.rating-buttons{
display:flex;
flex-direction:column;
gap:15px;
}

.rating-buttons button{
padding:16px;
font-size:20px;
font-weight:700;
border:none;
border-radius:15px;
cursor:pointer;
background:linear-gradient(135deg,#FFD700,#FFF3A0,#FFD700);
color:#033322;
transition:.3s;
box-shadow:0 0 18px rgba(255,215,0,.35);
}

.rating-buttons button:hover{
transform:scale(1.03);
}

#thankyou{
display:none;
margin-top:25px;
animation:fadeIn .5s;
}

#thankyou h2{
font-size:30px;
color:#FFD700;
margin-bottom:12px;
}

#thankyou p{
font-size:19px;
line-height:1.8;
}

.footer{
margin-top:25px;
font-size:14px;
color:#ddd;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:480px){

h1{
font-size:27px;
}

.subtitle{
font-size:19px;
}

.rating-buttons button{
font-size:18px;
}

}

<div class="card">

<h1>Jyoti Gruh Udhyog</h1>

<p class="subtitle">

</p>

<div class="rating-buttons">

<button id="excellent">😍 Excellent</button>

<button id="good">😊 Good</button>

<p>
🙏 તમારો કિંમતી અને અમૂલ્ય સમય આપી Review આપવા બદલ<br><br>

<b>Jyoti Gruh Udhyog</b> આપનો હૃદયપૂર્વક આભારી છે.<br><br>

🙏 ફરીથી ખૂબ ખૂબ આભાર!
</p>

</div>

<div class="footer">
© Jyoti Gruh Udhyog
</div>

</div>

<script>

const whatsappNumber="919712149344";

function sendReview(rating){

document.querySelector(".rating-buttons").style.display="none";

document.getElementById("thankyou").style.display="block";

let message="";

if(rating==="Excellent"){
message=`🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😍 Excellent

🙏 Thank You`;
}

if(rating==="Good"){
message=`🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😊 Good

🙏 Thank You`;
}

if(rating==="Needs Improvement"){
message=`🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😕 Needs Improvement

🙏 Thank You`;
}

setTimeout(function(){

window.location.href="https://wa.me/"+whatsappNumber+"?text="+encodeURIComponent(message);

},2500);

}

document.getElementById("excellent").onclick=function(){
sendReview("Excellent");
};

document.getElementById("good").onclick=function(){
sendReview("Good");
};

document.getElementById("improve").onclick=function(){
sendReview("Needs Improvement");
};

</script>

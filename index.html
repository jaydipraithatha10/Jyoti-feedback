<script>

const whatsappNumber = "919712149344";

function sendReview(rating){

document.querySelector(".rating-buttons").style.display = "none";

document.getElementById("thankyou").style.display = "block";

let message = "";

if(rating === "Excellent"){
message = `🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😍 Excellent

🙏 Thank You`;
}

if(rating === "Good"){
message = `🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😊 Good

🙏 Thank You`;
}

if(rating === "Needs Improvement"){
message = `🪔 *Jyoti Gruh Udhyog*

🌟 New Customer Review

😕 Needs Improvement

🙏 Thank You`;
}

setTimeout(function(){

window.location.href = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

},2500);

}

document.getElementById("excellent").addEventListener("click", function(){
sendReview("Excellent");
});

document.getElementById("good").addEventListener("click", function(){
sendReview("Good");
});

document.getElementById("improve").addEventListener("click", function(){
sendReview("Needs Improvement");
});

</script>

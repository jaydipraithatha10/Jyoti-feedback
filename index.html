<style>
/* CSS અહીં આવશે (Part 2) */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#033322,#0b5b42,#012117);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:2px solid rgba(255,215,0,.4);
border-radius:28px;
padding:35px 25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.45);
color:#fff;
}

.logo{
font-size:70px;
margin-bottom:15px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 8px gold);
}
to{
filter:drop-shadow(0 0 25px gold);
}
}

h1{
font-size:32px;
font-weight:700;
background:linear-gradient(90deg,#FFD700,#FFF3A0,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:15px;
}

.subtitle{
font-size:22px;
line-height:1.7;
margin-bottom:30px;
color:#fff;
}

.rating-buttons{
display:flex;
flex-direction:column;
gap:18px;
}

.rating-buttons button{
padding:18px;
font-size:20px;
font-weight:700;
border:none;
border-radius:16px;
cursor:pointer;
background:linear-gradient(135deg,#FFD700,#FFF3A0,#FFD700);
color:#033322;
box-shadow:0 0 18px rgba(255,215,0,.35);
transition:.25s;
}

.rating-buttons button:hover{
transform:scale(1.03);
}

#thankyou{
margin-top:30px;
animation:fadeIn .6s;
}

#thankyou h2{
font-size:30px;
color:#FFD700;
margin-bottom:10px;
}

#thankyou p{
font-size:18px;
line-height:1.8;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:480px){

h1{
font-size:28px;
}

.subtitle{
font-size:19px;
}

.rating-buttons button{
font-size:18px;
padding:16px;
}

}
</style>

</head>

<body>

<div class="card">

<div class="logo">🪔</div>

<h1>Jyoti Gruh Udhyog</h1>

<p class="subtitle">
🙏 તમને અમારી પ્રોડક્ટ કેવી લાગી?
</p>

<div class="rating-buttons">

<button id="excellent">😍 Excellent</button>

<button id="good">😊 Good</button>

<button id="improve">😕 Needs Improvement</button>

</div>

<div id="thankyou" style="display:none;">

<h2>💛 આભાર!</h2>

<p>
આપનો પ્રતિભાવ અમારા માટે ખૂબ જ કિંમતી છે.
</p>

</div>

</div>

<script>

/* JavaScript અહીં આવશે (Part 3) */
const whatsappNumber = "919712149344";

function sendReview(rating) {

    // બટન છુપાવો
    document.querySelector(".rating-buttons").style.display = "none";

    // Thank You બતાવો
    document.getElementById("thankyou").style.display = "block";

    let message = "";

    if (rating === "Excellent") {
        message = "😍 Excellent%0A%0Aમેં Jyoti Gruh Udhyog ની પ્રોડક્ટ લીધી હતી. ખૂબ જ સરસ લાગી.";
    }

    if (rating === "Good") {
        message = "😊 Good%0A%0Aમેં Jyoti Gruh Udhyog ની પ્રોડક્ટ લીધી હતી. સારી લાગી.";
    }

    if (rating === "Needs Improvement") {
        message = "😕 Needs Improvement%0A%0Aમારી પાસે થોડા સૂચનો છે.";
    }

    setTimeout(function () {
        window.location.href =
            "https://wa.me/" + whatsappNumber + "?text=" + message;
    }, 2000);

}

document
    .getElementById("excellent")
    .addEventListener("click", function () {
        sendReview("Excellent");
    });

document
    .getElementById("good")
    .addEventListener("click", function () {
        sendReview("Good");
    });

document
    .getElementById("improve")
    .addEventListener("click", function () {
        sendReview("Needs Improvement");
    });

</script>

</body>
